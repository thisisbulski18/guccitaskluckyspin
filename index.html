<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gucci Task Indonesia - Official Event</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body {
            background-color: #2b0609; 
            color: white;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            overflow-x: hidden;
            min-height: 100vh;
        }

        .font-serif { font-family: 'Playfair Display', serif; }

        .text-gold {
            background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .wheel-transition {
            transition: transform 7s cubic-bezier(0.15, 0, 0.1, 1);
        }

        .btn-gold {
            background: linear-gradient(180deg, #f3e5ab 0%, #d4af37 100%);
            color: #2b0609;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
        }

        .prize-container {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
        }

        .prize-text {
            margin-top: 55px;
            font-weight: 700;
            font-size: 11px;
            color: #f3e5ab;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }

        .footer-line {
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            width: 100%;
            margin-top: 60px;
        }

        /* --- BACKGROUND POPUP BARU (LEBIH BERWARNA & BERTEKSTUR) --- */
        .luxury-bg {
            /* Gradasi Merah yang lebih "Pop" di tengah */
            background: radial-gradient(circle at center, #8a0c14 0%, #4c060d 100%);
            position: relative;
            overflow: hidden;
        }
        
        /* Pola Diamond Quilted seperti gambar referensi */
        .pattern-overlay {
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(135deg, rgba(0,0,0,0.2) 25%, transparent 25%), 
                linear-gradient(225deg, rgba(0,0,0,0.2) 25%, transparent 25%), 
                linear-gradient(45deg, rgba(255,255,255,0.03) 25%, transparent 25%), 
                linear-gradient(315deg, rgba(255,255,255,0.03) 25%, transparent 25%);
            background-size: 60px 60px;
            background-position: 0 0, 30px 0, 30px 30px, 0 30px;
            opacity: 0.6;
            pointer-events: none;
        }

        .modal-animate {
            animation: modalPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        @keyframes modalPop {
            from { transform: scale(0.85); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .shimmer {
            position: relative;
            overflow: hidden;
        }
        .shimmer::after {
            content: "";
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.2), transparent);
            transform: rotate(45deg);
            animation: shimmerEffect 3s infinite;
        }
        @keyframes shimmerEffect {
            0% { transform: translateX(-100%) rotate(45deg); }
            100% { transform: translateX(100%) rotate(45deg); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const NOMOR_WHATSAPP_ADMIN = "6281373806156"; 

            const [rotation, setRotation] = useState(0);
            const [isSpinning, setIsSpinning] = useState(false);
            const [showModal, setShowModal] = useState(false);
            const [prizeResult, setPrizeResult] = useState("");
            const [hasSpun, setHasSpun] = useState(false);
            const [verifCode, setVerifCode] = useState("");

            const prizes = ["Rp 25.000", "Rp 30.000", "Rp 35.000", "Rp 40.000", "Rp 45.000", "Rp 50.000"];

            useEffect(() => {
                const savedSpin = localStorage.getItem('gucci_final_spun');
                const savedPrize = localStorage.getItem('gucci_final_prize');
                const savedCode = localStorage.getItem('gucci_final_code');
                if (savedSpin) {
                    setHasSpun(true);
                    setPrizeResult(savedPrize);
                    setVerifCode(savedCode);
                }
            }, []);

            const spinWheel = () => {
                if (isSpinning || hasSpun) return;
                setIsSpinning(true);
                const randomDegree = Math.floor(Math.random() * 360);
                const totalRotation = rotation + (360 * 10) + randomDegree;
                const code = "G-" + Math.floor(10000 + Math.random() * 90000);
                setRotation(totalRotation);
                setTimeout(() => {
                    const actualDegree = totalRotation % 360;
                    const prizeIndex = Math.floor(((360 - actualDegree) % 360) / 60);
                    setPrizeResult(prizes[prizeIndex]);
                    setVerifCode(code);
                    setIsSpinning(false);
                    setShowModal(true);
                    setHasSpun(true);
                    localStorage.setItem('gucci_final_spun', 'true');
                    localStorage.setItem('gucci_final_prize', prizes[prizeIndex]);
                    localStorage.setItem('gucci_final_code', code);
                }, 7000);
            };

            const handleWhatsAppClaim = () => {
                const pesan = `*"Gucci Task Indonesia"*%0A%0A*Event:* Lucky spin %0A*Hadiah:* *${prizeResult}*%0A*Gift Code:* *${verifCode}*%0A%0A_*"If you keep lookin' back, you gon' trip going forward."*_`;
                window.open(`https://wa.me/${NOMOR_WHATSAPP_ADMIN}?text=${pesan}`, '_blank');
            };

            return (
                <div className="min-h-screen flex flex-col items-center">
                    
                    {/* HEADER */}
                    <header className="pt-16 pb-12 text-center px-4">
                        <h1 className="font-serif text-5xl md:text-7xl text-white tracking-[0.3em] mb-4 uppercase">GUCCI</h1>
                        <div className="flex flex-col items-center">
                            <h2 className="text-gold text-lg md:text-2xl tracking-[0.4em] font-semibold uppercase">Task Indonesia</h2>
                            <p className="text-gold text-[10px] md:text-xs tracking-[0.6em] font-light uppercase mt-1 opacity-90">Special Event</p>
                        </div>
                    </header>

                    {/* WHEEL SECTION */}
                    <main className="flex-grow flex flex-col items-center w-full max-w-md px-6">
                        <div className="relative mb-14">
                            <div className="absolute -top-4 left-1/2 -translate-x-1/2 z-30">
                                <div className="w-10 h-10 bg-[#f3e5ab] rounded-full flex items-center justify-center border-2 border-[#b08d32]">
                                    <div className="w-0 h-0 border-l-[10px] border-l-transparent border-r-[10px] border-r-transparent border-t-[14px] border-t-[#b08d32] mt-10"></div>
                                </div>
                            </div>
                            <div className="p-3 rounded-full border border-white/10 shadow-2xl">
                                <div className="wheel-transition w-72 h-72 md:w-85 md:h-85 rounded-full border-[10px] border-[#d4af37] relative overflow-hidden"
                                    style={{ transform: `rotate(${rotation}deg)`, backgroundImage: `conic-gradient(#3d0c11 0deg 60deg, #2b0609 60deg 120deg, #3d0c11 120deg 180deg, #2b0609 180deg 240deg, #3d0c11 240deg 300deg, #2b0609 300deg 360deg)` }}>
                                    {prizes.map((p, i) => (
                                        <div key={i} className="prize-container" style={{ transform: `rotate(${i * 60 + 30}deg)` }}>
                                            <span className="prize-text">{p}</span>
                                        </div>
                                    ))}
                                    <div className="absolute inset-0 flex items-center justify-center">
                                        <div className="w-16 h-16 rounded-full border border-[#d4af37]/40 flex items-center justify-center bg-[#2b0609] z-20 shadow-2xl">
                                            <span className="text-2xl">🌙</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <button onClick={spinWheel} disabled={isSpinning || hasSpun}
                            className={`w-full py-4 rounded-sm text-[12px] font-bold tracking-[0.4em] uppercase transition-all btn-gold ${isSpinning || hasSpun ? 'opacity-50 grayscale' : 'hover:scale-[1.02] active:scale-95'}`}>
                            {isSpinning ? 'MEMUTAR...' : hasSpun ? 'SUDAH MENGAMBIL HADIAH' : 'PUTAR SEKARANG'}
                        </button>
                    </main>

                    {/* FOOTER */}
                    <div className="footer-line"></div>
                    <footer className="w-full py-14 px-6 flex flex-col items-center">
                        <div className="flex flex-wrap justify-center items-center gap-6 md:gap-12 mb-8">
                            <div className="w-5 h-5 border-[1px] border-white/50 rounded-full"></div>
                            <span className="text-[10px] font-medium uppercase tracking-[0.2em] opacity-80 cursor-pointer">Gucci Osteria</span>
                            <span className="text-[10px] font-medium uppercase tracking-[0.2em] opacity-80 cursor-pointer">Palazzo</span>
                            <span className="text-[10px] font-medium uppercase tracking-[0.2em] opacity-80 cursor-pointer">Gucci</span>
                        </div>
                        <div className="text-center">
                            <p className="text-[9px] tracking-[0.1em] text-white/30 uppercase leading-loose px-4">
                                © 2016 - 2026 GUCCIO GUCCI S.P.A. - ALL RIGHT RESERVED.<br/>
                                SIAE LICENCE# 2294/1/1938
                            </p>
                        </div>
                    </footer>

                    {/* MODAL POP-UP (BACKGROUND DIAMOND MERAH BERWARNA) */}
                    {showModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center px-6">
                            <div className="absolute inset-0 bg-black/90 backdrop-blur-md" onClick={() => setShowModal(false)}></div>
                            
                            <div className="modal-animate luxury-bg relative w-full max-w-[350px] border border-[#d4af37]/60 p-8 pt-16 shadow-[0_0_50px_rgba(0,0,0,0.6)]">
                                <div className="pattern-overlay"></div>

                                {/* GIFT TAG BOX ATAS */}
                                <div className="absolute -top-12 left-1/2 -translate-x-1/2 w-48 h-24 bg-[#4c060d] border border-[#d4af37] flex flex-col items-center justify-center z-20 shadow-xl">
                                    <span className="text-[11px] tracking-[0.3em] text-white font-bold mb-0.5 uppercase">GUCCI</span>
                                    <span className="text-[7px] tracking-[0.15em] text-[#d4af37] uppercase mb-2 font-medium">Task Indonesia</span>
                                    <span className="text-[16px] font-bold text-[#f3e5ab] tracking-widest">{verifCode}</span>
                                </div>

                                <div className="relative z-10 text-center">
                                    <p className="text-white/50 tracking-[0.2em] text-[10px] uppercase mb-4 font-semibold">Selamat! Anda Berhasil</p>
                                    
                                    <div className="relative inline-block mb-10">
                                        <h2 className="font-serif text-5xl md:text-6xl text-gold font-black italic drop-shadow-xl">{prizeResult}</h2>
                                        {/* Sparkles sesuai gambar */}
                                        <span className="absolute -top-6 -right-8 text-2xl drop-shadow-md">✨</span>
                                        <span className="absolute -bottom-2 -left-8 text-xl drop-shadow-md">✨</span>
                                    </div>

                                    <div className="p-0.5 bg-gradient-to-b from-[#fcf6ba] to-[#b38728] rounded-sm mb-8">
                                        <button onClick={handleWhatsAppClaim}
                                            className="shimmer w-full py-4 bg-[#4c060d] text-[#f3e5ab] font-bold text-[11px] tracking-[0.3em] uppercase hover:bg-transparent hover:text-white transition-all duration-300 shadow-lg">
                                            Klaim Hadiah Anda
                                        </button>
                                    </div>

                                    <div className="border-t border-white/10 pt-6">
                                        <p className="text-[8px] text-white/30 tracking-[0.1em] uppercase italic leading-relaxed">
                                            *Mohon simpan tangkapan layar (screenshot)<br/>sebagai bukti validasi untuk Admin
                                        </p>
                                    </div>
                                </div>

                                {/* Corner Accents Emas */}
                                <div className="absolute top-2 left-2 w-3 h-3 border-t border-l border-[#d4af37]/40"></div>
                                <div className="absolute top-2 right-2 w-3 h-3 border-t border-r border-[#d4af37]/40"></div>
                                <div className="absolute bottom-2 left-2 w-3 h-3 border-b border-l border-[#d4af37]/40"></div>
                                <div className="absolute bottom-2 right-2 w-3 h-3 border-b border-r border-[#d4af37]/40"></div>
                            </div>
                        </div>
                    )}

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
