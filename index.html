<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gucci Task Indonesia - Special Event</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body {
            background-color: #2b0609;
            color: white;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        .font-serif { font-family: 'Playfair Display', serif; }

        .text-gold {
            background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .wheel-transition {
            transition: transform 6s cubic-bezier(0.15, 0, 0.15, 1);
        }

        .btn-gold {
            background: linear-gradient(180deg, #f3e5ab 0%, #d4af37 100%);
            color: #2b0609;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
        }

        .prize-container {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
        }

        .prize-text {
            margin-top: 50px;
            font-weight: 700;
            font-size: 11px;
            color: #f3e5ab;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            text-transform: uppercase;
        }

        .modal-animate {
            animation: zoomIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        @keyframes zoomIn {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [rotation, setRotation] = useState(0);
            const [isSpinning, setIsSpinning] = useState(false);
            const [showModal, setShowModal] = useState(false);
            const [prizeResult, setPrizeResult] = useState("");
            const [hasSpun, setHasSpun] = useState(false);

            // Nominal hadiah sesuai permintaan (8 segmen)
            const prizes = [
                "Rp 25.000", "Rp 50.000", "Rp 30.000", "Rp 45.000", 
                "Rp 25.000", "Rp 40.000", "Rp 50.000", "Rp 30.000"
            ];

            // Cek apakah perangkat sudah pernah memutar roda sebelumnya
            useEffect(() => {
                const savedSpin = localStorage.getItem('gucci_event_spun');
                const savedPrize = localStorage.getItem('gucci_event_prize');
                if (savedSpin) {
                    setHasSpun(true);
                    setPrizeResult(savedPrize);
                }
            }, []);

            const spinWheel = () => {
                if (isSpinning || hasSpun) return;

                setIsSpinning(true);

                const randomDegree = Math.floor(Math.random() * 360);
                const totalRotation = rotation + (360 * 10) + randomDegree;
                setRotation(totalRotation);

                setTimeout(() => {
                    const actualDegree = totalRotation % 360;
                    const prizeIndex = Math.floor(((360 - actualDegree) % 360) / 45);
                    const finalPrize = prizes[prizeIndex];

                    setPrizeResult(finalPrize);
                    setIsSpinning(false);
                    setShowModal(true);
                    setHasSpun(true);

                    // Simpan status ke memori perangkat
                    localStorage.setItem('gucci_event_spun', 'true');
                    localStorage.setItem('gucci_event_prize', finalPrize);
                }, 6000);
            };

            return (
                <div className="min-h-screen flex flex-col items-center pb-10">
                    
                    {/* HEADER */}
                    <header className="pt-16 pb-12 text-center px-4">
                        <h1 className="font-serif text-5xl md:text-7xl text-white tracking-[0.3em] mb-4 uppercase leading-none">GUCCI</h1>
                        <div className="flex flex-col items-center">
                            <h2 className="text-gold text-lg md:text-2xl tracking-[0.4em] font-semibold uppercase">Task Indonesia</h2>
                            <p className="text-gold text-[10px] md:text-xs tracking-[0.6em] font-light uppercase mt-1 opacity-90">Special Event</p>
                        </div>
                    </header>

                    {/* WHEEL */}
                    <main className="flex-grow flex flex-col items-center w-full max-w-md px-6">
                        <div className="relative mb-14">
                            <div className="absolute -top-4 left-1/2 -translate-x-1/2 z-30 drop-shadow-xl">
                                <div className="w-10 h-10 bg-[#f3e5ab] rounded-full flex items-center justify-center border-2 border-[#b08d32]">
                                    <div className="w-0 h-0 border-l-[10px] border-l-transparent border-r-[10px] border-r-transparent border-t-[14px] border-t-[#b08d32] mt-10"></div>
                                </div>
                            </div>

                            <div className="p-3 rounded-full border border-white/10 shadow-2xl bg-black/5">
                                <div 
                                    className="wheel-transition w-72 h-72 md:w-85 md:h-85 rounded-full border-[10px] border-[#d4af37] relative overflow-hidden"
                                    style={{ 
                                        transform: `rotate(${rotation}deg)`,
                                        backgroundImage: `conic-gradient(
                                            #3d0c11 0deg 45deg, #2b0609 45deg 90deg, 
                                            #3d0c11 90deg 135deg, #2b0609 135deg 180deg,
                                            #3d0c11 180deg 225deg, #2b0609 225deg 270deg,
                                            #3d0c11 270deg 315deg, #2b0609 315deg 360deg
                                        )` 
                                    }}
                                >
                                    {prizes.map((p, i) => (
                                        <div 
                                            key={i}
                                            className="prize-container"
                                            style={{ transform: `rotate(${i * 45 + 22.5}deg)` }}
                                        >
                                            <span className="prize-text">{p}</span>
                                        </div>
                                    ))}

                                    <div className="absolute inset-0 flex items-center justify-center">
                                        <div className="w-16 h-16 rounded-full border border-[#d4af37]/50 flex items-center justify-center bg-[#2b0609] z-20">
                                            <span className="text-2xl">🌙</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* BUTTON */}
                        <div className="w-full px-4">
                            <button 
                                onClick={spinWheel}
                                disabled={isSpinning || hasSpun}
                                className={`w-full py-5 rounded-sm text-[13px] font-bold tracking-[0.4em] uppercase transition-all btn-gold
                                    ${(isSpinning || hasSpun) ? 'opacity-50 grayscale cursor-not-allowed' : 'hover:brightness-110 active:scale-95'}`}
                            >
                                {isSpinning ? 'Sedang Memutar...' : hasSpun ? 'Sudah Mengambil Hadiah' : 'Putar Sekarang'}
                            </button>
                            
                            {hasSpun && !isSpinning && (
                                <p className="text-[10px] text-[#f3e5ab]/50 mt-4 tracking-widest uppercase text-center">
                                    Kesempatan Anda telah habis untuk perangkat ini.
                                </p>
                            )}
                        </div>
                    </main>

                    {/* FOOTER */}
                    <footer className="w-full py-16 px-6 mt-10 border-t border-white/5 flex flex-col items-center">
                        <div className="flex justify-center items-center gap-6 md:gap-12 mb-10">
                            <div className="w-5 h-5 border-[1px] border-white/50 rounded-full"></div>
                            <span className="text-[10px] font-medium uppercase tracking-[0.2em] opacity-80">Gucci Osteria</span>
                            <span className="text-[10px] font-medium uppercase tracking-[0.2em] opacity-80">Palazzo</span>
                            <span className="text-[10px] font-medium uppercase tracking-[0.2em] opacity-80">Gucci</span>
                        </div>
                        <div className="text-center">
                            <p className="text-[9px] tracking-[0.15em] text-white/30 uppercase leading-loose">
                                © 2016 - 2026 GUCCIO GUCCI S.P.A. - ALL RIGHT RESERVED.<br/>
                                SIAE LICENCE# 2294/1/1938
                            </p>
                        </div>
                    </footer>

                    {/* MODAL HADIAH */}
                    {showModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center px-6">
                            <div className="absolute inset-0 bg-black/90 backdrop-blur-md" onClick={() => setShowModal(false)}></div>
                            <div className="modal-animate relative w-full max-w-sm bg-[#2b0609] border-[1px] border-[#d4af37] p-12 text-center shadow-2xl">
                                <div className="text-4xl mb-6">✨</div>
                                <h3 className="text-white tracking-[0.3em] text-[11px] uppercase opacity-50 mb-3">Selamat! Anda Mendapatkan</h3>
                                <h2 className="font-serif text-5xl text-[#f3e5ab] font-bold mb-10">{prizeResult}</h2>
                                <button 
                                    onClick={() => setShowModal(false)}
                                    className="w-full py-4 bg-[#f3e5ab] text-[#2b0609] text-[12px] font-bold tracking-[0.3em] uppercase shadow-lg"
                                >
                                    Klaim Sekarang
                                </button>
                            </div>
                        </div>
                    )}

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
