<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gucci Task Indonesia - Special Event</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body {
            background-color: #2b0609; /* Warna Maroon Gelap sesuai gambar */
            color: white;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        .font-serif { font-family: 'Playfair Display', serif; }

        /* Animasi Roda */
        .wheel-transition {
            transition: transform 6s cubic-bezier(0.15, 0, 0.15, 1);
        }

        /* Gradasi Tombol Sesuai Gambar */
        .btn-gold {
            background: linear-gradient(180deg, #e7d5a5 0%, #d4af37 100%);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        /* Footer Line */
        .footer-divider {
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            margin-top: 50px;
        }

        /* Label hadiah di roda agar melengkung/mengikuti radius */
        .prize-text {
            position: absolute;
            top: 25px;
            left: 50%;
            transform: translateX(-50%);
            font-weight: 600;
            font-size: 10px;
            color: #f3e5ab;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const App = () => {
            const [rotation, setRotation] = useState(0);
            const [isSpinning, setIsSpinning] = useState(false);
            const [winningPrize, setWinningPrize] = useState(null);

            // Daftar hadiah simetris (8 segmen)
            const prizes = [
                "Rp 25.000", "Rp 50.000", "Rp 30.000", "Rp 75.000", 
                "Rp 25.000", "Rp 40.000", "Rp 60.000", "Rp 35.000"
            ];

            const spinWheel = () => {
                if (isSpinning) return;
                setIsSpinning(true);
                setWinningPrize(null);

                // Tambahkan 8-10 putaran penuh + sudut acak
                const randomDegree = Math.floor(Math.random() * 360);
                const totalRotation = rotation + (360 * 10) + randomDegree;
                setRotation(totalRotation);

                setTimeout(() => {
                    // Hitung indeks hadiah berdasarkan sisa derajat
                    const actualDegree = totalRotation % 360;
                    const prizeIndex = Math.floor(((360 - actualDegree) % 360) / 45);
                    setWinningPrize(prizes[prizeIndex]);
                    setIsSpinning(false);
                }, 6000);
            };

            return (
                <div className="min-h-screen flex flex-col items-center">
                    
                    {/* HEADER: Gucci Task Indonesia Special Event */}
                    <header className="pt-12 pb-10 text-center px-4">
                        <h1 className="font-serif text-3xl md:text-5xl text-white tracking-[0.2em] mb-2 uppercase">GUCCI</h1>
                        <p className="text-[10px] md:text-xs tracking-[0.4em] text-[#d4af37] font-medium uppercase">Task Indonesia Special Event</p>
                    </header>

                    {/* MAIN CONTENT: Symmetrical Lucky Spin */}
                    <main className="flex-grow flex flex-col items-center w-full max-w-md px-6">
                        
                        {/* Wheel Container */}
                        <div className="relative mb-12">
                            {/* Pointer Sesuai Gambar */}
                            <div className="absolute -top-3 left-1/2 -translate-x-1/2 z-30">
                                <div className="w-10 h-10 bg-[#e7d5a5] rounded-full flex items-center justify-center border-2 border-[#b08d32] shadow-xl">
                                    <div className="w-0 h-0 border-l-[10px] border-l-transparent border-r-[10px] border-r-transparent border-t-[14px] border-t-[#b08d32] mt-10"></div>
                                </div>
                            </div>

                            {/* Roda Visual */}
                            <div className="p-3 rounded-full border border-white/5 shadow-[0_0_50px_rgba(0,0,0,0.4)]">
                                <div 
                                    className="wheel-transition w-72 h-72 md:w-80 md:h-80 rounded-full border-[8px] border-[#d4af37]/60 relative overflow-hidden"
                                    style={{ 
                                        transform: `rotate(${rotation}deg)`,
                                        backgroundImage: `conic-gradient(
                                            #3d0c11 0deg 45deg, #2b0609 45deg 90deg, 
                                            #3d0c11 90deg 135deg, #2b0609 135deg 180deg,
                                            #3d0c11 180deg 225deg, #2b0609 225deg 270deg,
                                            #3d0c11 270deg 315deg, #2b0609 315deg 360deg
                                        )` 
                                    }}
                                >
                                    {prizes.map((p, i) => (
                                        <div 
                                            key={i}
                                            className="absolute w-full h-full"
                                            style={{ transform: `rotate(${i * 45}deg)` }}
                                        >
                                            <span className="prize-text" style={{ transform: 'translateX(-50%) rotate(0deg)' }}>
                                                {p}
                                            </span>
                                        </div>
                                    ))}

                                    {/* Inner Circle with Moon Icon */}
                                    <div className="absolute inset-0 flex items-center justify-center">
                                        <div className="w-16 h-16 rounded-full border border-[#d4af37]/40 flex items-center justify-center bg-[#2b0609] z-20 shadow-inner">
                                            <span className="text-2xl text-[#d4af37]">🌙</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* Button: PUTAR SEKARANG */}
                        <div className="w-full text-center">
                            <button 
                                onClick={spinWheel}
                                disabled={isSpinning}
                                className={`w-full py-4 rounded-sm text-[13px] font-bold tracking-[0.3em] transition-all btn-gold text-black uppercase mb-8
                                    ${isSpinning ? 'opacity-50 grayscale' : 'hover:brightness-110 active:scale-95'}`}
                            >
                                {isSpinning ? 'Mohon Tunggu...' : 'PUTAR SEKARANG'}
                            </button>

                            {/* Result Area */}
                            {winningPrize && (
                                <div className="animate-fade-in-up">
                                    <p className="text-[10px] uppercase tracking-[0.2em] opacity-60 mb-2">Selamat! Anda Mendapatkan</p>
                                    <h2 className="text-4xl font-serif text-[#f3e5ab] font-bold tracking-tight">
                                        {winningPrize}
                                    </h2>
                                </div>
                            )}
                        </div>
                    </main>

                    {/* FOOTER: Persis Gambar */}
                    <div className="footer-divider"></div>
                    <footer className="w-full py-12 px-6 flex flex-col items-center">
                        <div className="flex flex-wrap justify-center items-center gap-6 md:gap-10 mb-8">
                            {/* Circle Icon */}
                            <div className="w-5 h-5 border-2 border-white/60 rounded-full"></div>
                            
                            <span className="text-[10px] font-medium uppercase tracking-[0.2em] opacity-80 cursor-pointer hover:text-[#d4af37]">Gucci Osteria</span>
                            <span className="text-[10px] font-medium uppercase tracking-[0.2em] opacity-80 cursor-pointer hover:text-[#d4af37]">Palazzo</span>
                            <span className="text-[10px] font-medium uppercase tracking-[0.2em] opacity-80 cursor-pointer hover:text-[#d4af37]">Gucci</span>
                        </div>

                        <div className="text-center px-4">
                            <p className="text-[9px] tracking-[0.1em] text-white/40 uppercase leading-loose max-w-xs md:max-w-none">
                                © 2016 - 2026 GUCCIO GUCCI S.P.A. - ALL RIGHT RESERVED. SIAE LICENCE# 2294/1/1938
                            </p>
                        </div>
                    </footer>

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
