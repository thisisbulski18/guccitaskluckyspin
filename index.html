<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ramadhan Berkah - Spin Wheel</title>
    
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & Babel via CDN (Supaya bisa baca kodingan React di HTML) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap');
        
        body {
            font-family: 'Playfair Display', serif;
            margin: 0;
            background-color: #022c22;
        }

        /* Animasi Roda Custom tanpa Framer Motion supaya ringan di HTML biasa */
        .wheel-rotate {
            transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1);
        }

        .stars {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.3;
            animation: twinkle 3s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.8; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const App = () => {
            const [rotation, setRotation] = useState(0);
            const [isSpinning, setIsSpinning] = useState(false);
            const [prize, setPrize] = useState(null);

            const spinWheel = () => {
                if (isSpinning) return;

                setIsSpinning(true);
                setPrize(null);

                // Tambah putaran minimal 5 kali + derajat acak
                const extraDegree = Math.floor(Math.random() * 360);
                const totalRotation = rotation + 1800 + extraDegree;
                
                setRotation(totalRotation);

                setTimeout(() => {
                    setIsSpinning(false);
                    setPrize("Selamat! Anda mendapatkan Berkah Ramadhan.");
                }, 5000);
            };

            return (
                <div className="min-h-screen flex items-center justify-center p-4 relative overflow-hidden">
                    
                    {/* Partikel Bintang */}
                    {[...Array(20)].map((_, i) => (
                        <div 
                            key={i}
                            className="stars"
                            style={{
                                width: Math.random() * 3 + 'px',
                                height: Math.random() * 3 + 'px',
                                top: Math.random() * 100 + '%',
                                left: Math.random() * 100 + '%',
                                animationDelay: Math.random() * 5 + 's'
                            }}
                        ></div>
                    ))}

                    {/* Main Card */}
                    <div className="relative z-10 w-full max-w-md border-[2px] border-[#d4af37]/50 rounded-[40px] bg-emerald-950/80 backdrop-blur-md p-8 text-center shadow-2xl">
                        
                        <div className="mb-6">
                            <div className="flex items-center justify-center gap-2 mb-2 text-[#d4af37]">
                                <span>✦</span>
                                <span className="text-[10px] tracking-[0.4em] uppercase">Ramadhan Edition</span>
                                <span>✦</span>
                            </div>
                            <h1 className="text-[#f3e5ab] text-3xl font-bold tracking-wide">BERKAH RAMADHAN</h1>
                            <p className="text-gray-300 text-[11px] mt-2 italic px-6">
                                Putar roda kebaikan dan dapatkan bingkisan spesial di bulan yang suci ini.
                            </p>
                        </div>

                        {/* Wheel Visual */}
                        <div className="relative flex justify-center my-10">
                            {/* Pointer */}
                            <div className="absolute -top-4 z-20">
                                <div className="w-0 h-0 border-l-[12px] border-l-transparent border-r-[12px] border-r-transparent border-t-[20px] border-t-red-600"></div>
                            </div>

                            <div 
                                className="wheel-rotate w-64 h-64 md:w-72 md:h-72 rounded-full border-[8px] border-[#d4af37] shadow-lg relative overflow-hidden"
                                style={{ 
                                    transform: `rotate(${rotation}deg)`,
                                    backgroundImage: `conic-gradient(
                                        #064e3b 0deg 45deg, #d4af37 45deg 90deg, 
                                        #065f46 90deg 135deg, #f3e5ab 135deg 180deg,
                                        #064e3b 180deg 225deg, #d4af37 225deg 270deg,
                                        #065f46 270deg 315deg, #f3e5ab 315deg 360deg
                                    )` 
                                }}
                            >
                                {/* Center Circle */}
                                <div className="absolute inset-0 flex items-center justify-center">
                                    <div className="w-16 h-16 bg-[#022c22] rounded-full border-2 border-[#d4af37] flex items-center justify-center shadow-md">
                                        <span className="text-xl">🌙</span>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* Button */}
                        <button 
                            onClick={spinWheel}
                            disabled={isSpinning}
                            className={`w-full py-4 rounded-full text-[12px] font-bold tracking-[0.2em] transition-all
                                ${isSpinning 
                                    ? 'bg-emerald-900 text-emerald-700' 
                                    : 'bg-gradient-to-r from-[#d4af37] to-[#b08d32] text-emerald-950 shadow-xl hover:scale-105 active:scale-95'
                                }`}
                        >
                            {isSpinning ? 'MOHON TUNGGU...' : 'AMBIL BERKAH SEKARANG'}
                        </button>

                        {prize && (
                            <div className="mt-4 p-3 bg-yellow-500/20 border border-yellow-500/50 rounded-lg animate-bounce">
                                <p className="text-[#f3e5ab] text-xs">{prize}</p>
                            </div>
                        )}

                        <div className="mt-10 opacity-40">
                            <p className="text-[#d4af37] text-[8px] tracking-[0.3em]">RAMADHAN KAREEM 1447 H</p>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
