<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gucci Exclusive Event</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body {
            background-color: #2b0609; /* Warna Maroon Gelap sesuai gambar */
            color: white;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        .font-serif { font-family: 'Playfair Display', serif; }

        /* Animasi Roda */
        .wheel-transition {
            transition: transform 6s cubic-bezier(0.2, 0, 0.1, 1);
        }

        /* Tombol Emas Shimmer */
        .btn-gold {
            background: linear-gradient(135deg, #c5a059 0%, #f3e5ab 50%, #c5a059 100%);
            background-size: 200% auto;
            animation: shine 3s linear infinite;
        }
        @keyframes shine {
            to { background-position: 200% center; }
        }

        .gucci-logo {
            letter-spacing: 0.3em;
            text-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        footer {
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const App = () => {
            const [rotation, setRotation] = useState(0);
            const [isSpinning, setIsSpinning] = useState(false);
            const [winningPrize, setWinningPrize] = useState(null);

            const prizes = [
                "Rp 25.000", "Rp 50.000", "Rp 30.000", "Rp 75.000", 
                "Rp 25.000", "Rp 40.000", "Rp 60.000", "Rp 35.000"
            ];

            const spinWheel = () => {
                if (isSpinning) return;
                setIsSpinning(true);
                setWinningPrize(null);

                const randomDegree = Math.floor(Math.random() * 360);
                const totalRotation = rotation + (360 * 8) + randomDegree;
                setRotation(totalRotation);

                setTimeout(() => {
                    const actualDegree = totalRotation % 360;
                    const prizeIndex = Math.floor(((360 - actualDegree) % 360) / 45);
                    setWinningPrize(prizes[prizeIndex]);
                    setIsSpinning(false);
                }, 6000);
            };

            return (
                <div className="min-h-screen flex flex-col">
                    
                    {/* HEADER: Persis Gambar */}
                    <header className="pt-16 pb-8 text-center">
                        <h1 className="gucci-logo font-serif text-6xl md:text-8xl text-white">GUCCI</h1>
                    </header>

                    {/* MAIN CONTENT: Lucky Spin */}
                    <main className="flex-grow flex flex-col items-center px-6">
                        
                        {/* Container Roda */}
                        <div className="relative mb-12">
                            {/* Pointer Luxury */}
                            <div className="absolute -top-6 left-1/2 -translate-x-1/2 z-30">
                                <div className="w-8 h-8 bg-[#f3e5ab] rounded-full flex items-center justify-center border-2 border-[#c5a059]">
                                    <div className="w-0 h-0 border-l-[8px] border-l-transparent border-r-[8px] border-r-transparent border-t-[12px] border-t-[#c5a059] mt-8"></div>
                                </div>
                            </div>

                            {/* Roda Visual */}
                            <div className="p-4 rounded-full border border-white/10 shadow-2xl">
                                <div 
                                    className="wheel-transition w-72 h-72 md:w-80 md:h-80 rounded-full border-[10px] border-[#c5a059] relative overflow-hidden"
                                    style={{ 
                                        transform: `rotate(${rotation}deg)`,
                                        backgroundImage: `conic-gradient(
                                            #3d0c11 0deg 45deg, #2b0609 45deg 90deg, 
                                            #3d0c11 90deg 135deg, #2b0609 135deg 180deg,
                                            #3d0c11 180deg 225deg, #2b0609 225deg 270deg,
                                            #3d0c11 270deg 315deg, #2b0609 315deg 360deg
                                        )` 
                                    }}
                                >
                                    {prizes.map((p, i) => (
                                        <div 
                                            key={i}
                                            className="absolute w-full h-full text-center pt-8 font-bold text-[10px] text-[#f3e5ab]"
                                            style={{ transform: `rotate(${i * 45 + 22.5}deg)` }}
                                        >
                                            {p}
                                        </div>
                                    ))}
                                    {/* Center Logo */}
                                    <div className="absolute inset-0 flex items-center justify-center">
                                        <div className="w-14 h-14 bg-[#2b0609] rounded-full border-2 border-[#d4af37] flex items-center justify-center shadow-2xl z-20">
                                            <span className="text-xl">🌙</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* Button Spin */}
                        <div className="w-full max-w-xs text-center">
                            <button 
                                onClick={spinWheel}
                                disabled={isSpinning}
                                className={`w-full py-4 rounded-sm text-[12px] font-bold tracking-[0.4em] transition-all btn-gold text-black uppercase shadow-2xl mb-6
                                    ${isSpinning ? 'opacity-50' : 'hover:scale-[1.02] active:scale-95'}`}
                            >
                                {isSpinning ? 'MEMUTAR...' : 'PUTAR SEKARANG'}
                            </button>

                            {winningPrize && (
                                <div className="animate-bounce">
                                    <p className="text-[10px] uppercase tracking-widest opacity-60">Selamat! Anda Mendapatkan</p>
                                    <h2 className="text-3xl font-serif text-[#f3e5ab]">{winningPrize}</h2>
                                </div>
                            )}
                        </div>
                    </main>

                    {/* FOOTER: Persis Gambar */}
                    <footer className="w-full py-12 px-6 mt-12">
                        <div className="max-w-4xl mx-auto">
                            <div className="flex flex-wrap justify-center items-center gap-6 md:gap-12 mb-8">
                                <div className="opacity-80">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="white">
                                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/>
                                    </svg>
                                </div>
                                <span className="text-[10px] uppercase tracking-[0.2em] opacity-80">Gucci Osteria</span>
                                <span className="text-[10px] uppercase tracking-[0.2em] opacity-80">Palazzo</span>
                                <span className="text-[10px] uppercase tracking-[0.2em] opacity-80">Gucci</span>
                            </div>
                            <div className="text-center">
                                <p className="text-[9px] tracking-[0.1em] text-white/40 uppercase leading-relaxed">
                                    © 2016 - 2026 GUCCIO GUCCI S.P.A. - ALL RIGHT RESERVED. SIAE LICENCE# 2294/1/1938
                                </p>
                            </div>
                        </div>
                    </footer>

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
