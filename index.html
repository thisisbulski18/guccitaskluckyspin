<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gucci - Exclusive Event</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts: Serif untuk gaya mewah -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            background-color: #2b0609; /* Warna Maroon Gelap sesuai gambar */
            color: white;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
        }

        .font-serif {
            font-family: 'Playfair Display', serif;
        }

        .gucci-logo {
            letter-spacing: 0.3em;
            font-weight: 400;
        }

        .timer-box {
            background-color: #3d0c11; /* Warna coklat maroon kotak */
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        footer {
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .footer-link {
            letter-spacing: 0.2em;
            font-size: 10px;
            transition: opacity 0.3s;
        }

        .footer-link:hover {
            opacity: 0.7;
        }
    </style>
</head>
<body className="flex flex-col min-h-screen">

    <div className="flex-grow flex flex-col items-center justify-center px-6 py-12">
        
        <!-- HEADER: Nama GUCCI -->
        <div className="mb-12 text-center">
            <h1 className="gucci-logo font-serif text-6xl md:text-8xl text-white">GUCCI</h1>
        </div>

        <!-- TIMER SECTION -->
        <div className="grid grid-cols-2 gap-4 w-full max-w-lg mb-10">
            <!-- Mulai -->
            <div className="timer-box rounded-sm p-8 text-center">
                <p className="text-[10px] tracking-[0.3em] uppercase opacity-60 mb-6">Mulai</p>
                <p className="font-serif text-4xl md:text-5xl">12:56</p>
            </div>
            <!-- Selesai -->
            <div className="timer-box rounded-sm p-8 text-center">
                <p className="text-[10px] tracking-[0.3em] uppercase opacity-60 mb-6">Selesai</p>
                <p className="font-serif text-4xl md:text-5xl">13:01</p>
            </div>
        </div>

        <!-- INSTRUCTION TEXT -->
        <div className="text-center space-y-2 max-w-md">
            <div className="w-12 h-[1px] bg-white/20 mx-auto mb-6"></div>
            <p className="text-[10px] tracking-[0.15em] leading-loose opacity-80 uppercase">
                Sistem sedang memproses profit di dalam akun anda
            </p>
            <p className="text-[10px] tracking-[0.15em] leading-loose opacity-80 uppercase">
                Mohon menunggu hingga waktu yang ditentukan sistem berakhir
            </p>
        </div>
    </div>

    <!-- FOOTER: Sesuai Gambar -->
    <footer className="w-full py-12 px-6">
        <div className="max-w-4xl mx-auto">
            <!-- Navigasi Footer -->
            <div className="flex flex-wrap justify-center items-center gap-6 md:gap-12 mb-8">
                <div className="opacity-80">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="white">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/>
                    </svg>
                </div>
                <a href="#" className="footer-link uppercase">Gucci Osteria</a>
                <a href="#" className="footer-link uppercase">Palazzo</a>
                <a href="#" className="footer-link uppercase">Gucci</a>
            </div>

            <!-- Copyright & Lisensi -->
            <div className="text-center">
                <p className="text-[9px] tracking-[0.1em] text-white/40 uppercase leading-relaxed">
                    © 2016 - 2026 GUCCIO GUCCI S.P.A. - ALL RIGHT RESERVED. SIAE LICENCE# 2294/1/1938
                </p>
            </div>
        </div>
    </footer>

</body>
</html>
