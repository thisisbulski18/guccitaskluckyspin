<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gucci Task Indonesia - Claim Prize</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { background-color: #0f0506; color: white; font-family: 'Montserrat', sans-serif; }
        .font-serif { font-family: 'Playfair Display', serif; }
        .text-gold {
            background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .wheel-transition { transition: transform 7s cubic-bezier(0.15, 0, 0.1, 1); }
        .btn-claim { background-color: #f1e4bc; color: #2b0609; font-weight: 700; }
        .modal-animate { animation: modalPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
        @keyframes modalPop { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .prize-container { position: absolute; width: 100%; height: 100%; display: flex; justify-content: center; }
        .prize-text { margin-top: 55px; font-weight: 700; font-size: 11px; color: #f3e5ab; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            // --- GANTI NOMOR WHATSAPP DI SINI ---
            const NOMOR_ADMIN = "6281234567890"; 

            const [rotation, setRotation] = useState(0);
            const [isSpinning, setIsSpinning] = useState(false);
            const [showModal, setShowModal] = useState(false);
            const [prizeResult, setPrizeResult] = useState("");
            const [hasSpun, setHasSpun] = useState(false);
            const [verifCode, setVerifCode] = useState("");

            const prizes = ["Rp 25.000", "Rp 30.000", "Rp 35.000", "Rp 40.000", "Rp 45.000", "Rp 50.000"];

            useEffect(() => {
                const savedSpin = localStorage.getItem('gucci_v7_spun');
                const savedPrize = localStorage.getItem('gucci_v7_prize');
                const savedCode = localStorage.getItem('gucci_v7_code');
                if (savedSpin) {
                    setHasSpun(true);
                    setPrizeResult(savedPrize);
                    setVerifCode(savedCode);
                }
            }, []);

            const spinWheel = () => {
                if (isSpinning || hasSpun) return;
                setIsSpinning(true);

                const randomDegree = Math.floor(Math.random() * 360);
                const totalRotation = rotation + (360 * 10) + randomDegree;
                
                // Buat Kode Verifikasi Acak (Contoh: G-82910)
                const code = "G-" + Math.floor(10000 + Math.random() * 90000);

                setRotation(totalRotation);

                setTimeout(() => {
                    const actualDegree = totalRotation % 360;
                    const prizeIndex = Math.floor(((360 - actualDegree) % 360) / 60);
                    const finalPrize = prizes[prizeIndex];

                    setPrizeResult(finalPrize);
                    setVerifCode(code);
                    setIsSpinning(false);
                    setShowModal(true);
                    setHasSpun(true);

                    localStorage.setItem('gucci_v7_spun', 'true');
                    localStorage.setItem('gucci_v7_prize', finalPrize);
                    localStorage.setItem('gucci_v7_code', code);
                }, 7000);
            };

            const handleWhatsApp = () => {
                const time = new Date().toLocaleString('id-ID');
                const pesan = `*KLAIM HADIAH LUCKY SPIN*%0A%0A` +
                              `Event: Gucci Task Indonesia%0A` +
                              `Hadiah: *${prizeResult}*%0A` +
                              `Kode Verifikasi: *${verifCode}*%0A` +
                              `Waktu: ${time}%0A%0A` +
                              `_Mohon admin segera proses klaim saya. (Bukti Screenshot terlampir)_`;
                
                const url = `https://wa.me/${NOMOR_ADMIN}?text=${pesan}`;
                window.open(url, '_blank');
            };

            return (
                <div className="min-h-screen bg-[#2b0609] flex flex-col items-center">
                    <header className="pt-16 pb-12 text-center">
                        <h1 className="font-serif text-6xl md:text-8xl text-white tracking-[0.3em] mb-4 uppercase">GUCCI</h1>
                        <h2 className="text-gold text-lg md:text-2xl tracking-[0.4em] font-semibold uppercase">Task Indonesia</h2>
                    </header>

                    <main className="flex flex-col items-center w-full max-w-md px-6">
                        <div className="relative mb-14">
                            <div className="absolute -top-4 left-1/2 -translate-x-1/2 z-30">
                                <div className="w-10 h-10 bg-[#f3e5ab] rounded-full border-2 border-[#b08d32] flex items-center justify-center">
                                    <div className="w-0 h-0 border-l-[10px] border-l-transparent border-r-[10px] border-r-transparent border-t-[14px] border-t-[#b08d32] mt-10"></div>
                                </div>
                            </div>

                            <div 
                                className="wheel-transition w-72 h-72 md:w-85 md:h-85 rounded-full border-[10px] border-[#d4af37] relative overflow-hidden"
                                style={{ transform: `rotate(${rotation}deg)`, backgroundImage: `conic-gradient(#3d0c11 0deg 60deg, #2b0609 60deg 120deg, #3d0c11 120deg 180deg, #2b0609 180deg 240deg, #3d0c11 240deg 300deg, #2b0609 300deg 360deg)` }}
                            >
                                {prizes.map((p, i) => (
                                    <div key={i} className="prize-container" style={{ transform: `rotate(${i * 60 + 30}deg)` }}>
                                        <span className="prize-text">{p}</span>
                                    </div>
                                ))}
                            </div>
                        </div>

                        <button onClick={spinWheel} disabled={isSpinning || hasSpun} className="w-full py-4 bg-gradient-to-b from-[#f3e5ab] to-[#d4af37] text-[#2b0609] font-bold tracking-[0.4em] uppercase shadow-2xl">
                            {isSpinning ? 'MEMUTAR...' : hasSpun ? 'SUDAH DIAMBIL' : 'PUTAR SEKARANG'}
                        </button>
                    </main>

                    {showModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center px-6">
                            <div className="absolute inset-0 bg-black/95 backdrop-blur-sm"></div>
                            <div className="modal-animate relative w-full max-w-sm bg-[#220406] border-[1px] border-[#d4af37] p-8 pt-16 text-center shadow-2xl">
                                
                                <div className="absolute -top-10 left-1/2 -translate-x-1/2 w-32 h-20 bg-[#220406] border border-[#d4af37] flex flex-col items-center justify-center">
                                    <span className="text-[8px] tracking-[0.2em] font-bold">GUCCI</span>
                                    <span className="text-[6px] text-gold uppercase tracking-tighter">Task Indonesia</span>
                                    <span className="text-[10px] mt-1 font-mono text-[#f3e5ab]">{verifCode}</span>
                                </div>

                                <p className="text-white/50 text-[9px] uppercase tracking-[0.2em] mb-2">Selamat! Anda Berhasil</p>
                                <h2 className="font-serif text-5xl text-[#f3e5ab] font-bold mb-6">{prizeResult}</h2>
                                
                                <div className="p-2 border border-[#d4af37]/30 mb-4 bg-black/20">
                                    <p className="text-[8px] text-yellow-200/70 mb-2 uppercase tracking-widest">PENTING: Screenshot layar ini!</p>
                                    <button onClick={handleWhatsApp} className="w-full py-4 btn-claim text-[11px] uppercase tracking-[0.2em]">
                                        Klaim Hadiah Anda
                                    </button>
                                </div>
                                <p className="text-[7px] text-white/30 uppercase tracking-widest leading-relaxed">
                                    Klik tombol di atas untuk mengirim bukti klaim ke WhatsApp Admin
                                </p>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
